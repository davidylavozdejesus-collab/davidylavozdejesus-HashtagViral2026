    let audioCtx = null;

    const getAudioContext = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    };

    const isSoundEnabled = () => {
      const saved = localStorage.getItem('sound_enabled');
      return saved !== null ? saved === 'true' : true;
    };

    const setSoundEnabled = (enabled) => {
      localStorage.setItem('sound_enabled', enabled ? 'true' : 'false');
    };

    const playClickSound = () => {
      if (!isSoundEnabled()) return;
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.05);
        gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      } catch (e) { console.warn(e); }
    };

    const playSuccessSound = () => {
      if (!isSoundEnabled()) return;
      try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(659.25, now);
        osc1.frequency.setValueAtTime(880, now + 0.08);
        gain1.gain.setValueAtTime(0.06, now);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.3);

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1318.51, now + 0.08);
        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.03, now + 0.08);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now);
        osc2.stop(now + 0.4);
      } catch (e) { console.warn(e); }
    };

        if (sec.blocks) {

    const STOP_WORDS = new Set([
      'de', 'la', 'el', 'en', 'y', 'a', 'los', 'que', 'del', 'un', 'una', 'con', 'para', 'por', 'es', 'su', 'al', 'lo', 'como', 'mas', 'pero', 'sus', 'o', 'este', 'esta', 'se'

    const sanitizeToHashtag = (str) => {
      if (!str) return '';
      const cleaned = str
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9\s]/g, "");
      const words = cleaned.split(/\s+/).filter(Boolean);
      return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
    };

    const extractTitleKeywords = (title) => {
      if (!title) return [];
      const words = title
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9\s]/g, "")
        .toLowerCase()
        .split(/\s+/)
        .filter(w => w.length > 2 && !STOP_WORDS.has(w));
      
      const conceptualTags = [];
      const lowercaseTitle = title.toLowerCase();
      const triggers = [
        { key: 'sana', tags: ['#SanacionInterior', '#JesusSana', '#SanaMiAlma'] },
        { key: 'dolor', tags: ['#PazEnElDolor', '#SanacionInterior', '#Consuelo'] },
        { key: 'fe', tags: ['#AumentaMiFe', '#FeViva', '#FeEnDios'] },
        { key: 'oracion', tags: ['#OracionFrecuente', '#HoraDeOrar'] },
        { key: 'maria', tags: ['#VirgenMaria', '#TotusTuus'] },
        { key: 'rosario', tags: ['#SantoRosario', '#RosarioDelDia'] },
        { key: 'jesus', tags: ['#AmigoJesus', '#JesusEsElCamino'] },
        { key: 'dios', tags: ['#AmorDeDios', '#DiosConmigo'] }
      ];

      triggers.forEach(t => {
        if (lowercaseTitle.includes(t.key)) conceptualTags.push(...t.tags);
      });

      const rawWordTags = words.map(w => `#${w.charAt(0).toUpperCase() + w.slice(1)}`);
      return [...new Set([...conceptualTags, ...rawWordTags])];
    };

    const generateHashtags = ({ title, contentType, communityId, manualAudience = 'adultos' }) => {
      const community = COMMUNITIES[communityId] || COMMUNITIES.DAVIDYLAVOZDEJESUS_ADULTOS;
      const audience = community.audience || manualAudience;

      const pool = DB[audience] || DB.adultos;
      const generalPool = [...pool.generales];
      const thematicPool = pool.tematicos[contentType] || pool.tematicos['Mensaje de reflexión'] || [];
      const fallbackThematicPool = Object.values(pool.tematicos).flat();

      const communityTag = community.id === 'OTRAS_OPCIONES' 
        ? (audience === 'ninos' ? '#NiñosCatolicos' : audience === 'adolescentes' ? '#JovenesCatolicos' : '#CatolicosActivos')
        : community.tag;

      const primaryTitleTag = sanitizeToHashtag(title) ? `#${sanitizeToHashtag(title)}` : '';
      const derivedTitleTags = extractTitleKeywords(title);
      
      const englishGeneralPool = audience === 'ninos' 
        ? ['#KidsFaith', '#HolyKids', '#JesusLovesMe', '#CatholicKids', '#FamilyFaith']
        : audience === 'adolescentes'
        ? ['#CatholicYouth', '#ChristianVibes', '#JesusSaves', '#FaithGoals', '#HolyEnergy']
        : ['#CatholicChurch', '#ChristianFaith', '#CatholicLife', '#DailyDevotion', '#SpiritualGrowth'];

      const customPersonalizedBase = audience === 'ninos'
        ? ['#FeFamiliar', '#AprenderJugando', '#SembrandoFe', '#AmigosDeJesus', '#CatequesisKids', '#NinosEvangelizadores']
        : audience === 'adolescentes'
        ? ['#GeneracionEnFuego', '#LuzEnLaRed', '#EvangelioModerno', '#LocosPorCristo', '#CatolicosUnidos', '#JuventudDigital']
        : ['#DiscípulosHoy', '#EvangelizacionOrgánica', '#FeMadura', '#CrecimientoEspiritual', '#CompromisoCatolico', '#VocacionDivina'];

      // YOUTUBE (30 Tags)
      const ytHashtags = { generales: [], tematicos: [], personalizados: [] };
      const ytPersonalizados = new Set([communityTag]);
      if (primaryTitleTag) ytPersonalizados.add(primaryTitleTag);
      derivedTitleTags.forEach(tag => ytPersonalizados.add(tag));
      let pIdx = 0;
      while (ytPersonalizados.size < 10 && pIdx < customPersonalizedBase.length) {
        ytPersonalizados.add(customPersonalizedBase[pIdx]);
        pIdx++;
      }
      ytHashtags.personalizados = Array.from(ytPersonalizados).slice(0, 10);

      const ytThematics = new Set(thematicPool);
      let tIdx = 0;
      while (ytThematics.size < 10 && tIdx < fallbackThematicPool.length) {
        ytThematics.add(fallbackThematicPool[tIdx]);
        tIdx++;
      }
      ytHashtags.tematicos = Array.from(ytThematics).slice(0, 10);

      const ytGenerals = new Set([englishGeneralPool[0], englishGeneralPool[1]]);
      let gIdx = 0;
      while (ytGenerals.size < 10 && gIdx < generalPool.length) {
        const candidate = generalPool[gIdx];
        if (!ytPersonalizados.has(candidate) && !ytThematics.has(candidate)) {
          ytGenerals.add(candidate);
        }
        gIdx++;
      }
      ytHashtags.generales = Array.from(ytGenerals).slice(0, 10);

      // FACEBOOK (25 Tags)
      const fbHashtags = { generales: [], tematicos: [], personalizados: [] };
      const fbPers = new Set([communityTag]);
      if (primaryTitleTag) fbPers.add(primaryTitleTag);
      derivedTitleTags.forEach(tag => fbPers.add(tag));
      let fbP = 0;
      while(fbPers.size < 8 && fbP < customPersonalizedBase.length) {
        fbPers.add(customPersonalizedBase[fbP]);
        fbP++;
      }
      fbHashtags.personalizados = Array.from(fbPers).slice(0, 8);

      const fbThem = new Set(thematicPool);
      let fbT = 0;
      while(fbThem.size < 9 && fbT < fallbackThematicPool.length) {
        fbThem.add(fallbackThematicPool[fbT]);
        fbT++;
      }
      fbHashtags.tematicos = Array.from(fbThem).slice(0, 9);

      const fbGen = new Set([englishGeneralPool[2], englishGeneralPool[3]]);
      let fbG = 0;
      while(fbGen.size < 8 && fbG < generalPool.length) {
        const candidate = generalPool[fbG];
        if (!fbPers.has(candidate) && !fbThem.has(candidate)) {
          fbGen.add(candidate);
        }
        fbG++;
      }
      fbHashtags.generales = Array.from(fbGen).slice(0, 8);

      // INSTAGRAM (12 Tags)
      const igHashtags = { generales: [], tematicos: [], personalizados: [] };
      const igPers = new Set([communityTag]);
      if (primaryTitleTag) igPers.add(primaryTitleTag);
      derivedTitleTags.forEach(tag => igPers.add(tag));
      let igP = 0;
      while (igPers.size < 4 && igP < customPersonalizedBase.length) {
        igPers.add(customPersonalizedBase[igP]);
        igP++;
      }
      igHashtags.personalizados = Array.from(igPers).slice(0, 4);

      const igThem = new Set(thematicPool);
      let igT = 0;
      while(igThem.size < 4 && igT < fallbackThematicPool.length) {
        igThem.add(fallbackThematicPool[igT]);
        igT++;
      }
      igHashtags.tematicos = Array.from(igThem).slice(0, 4);

      const igGen = new Set([englishGeneralPool[4]]);
      let igG = 0;
      while(igGen.size < 4 && igG < generalPool.length) {
        const candidate = generalPool[igG];
        if (!igPers.has(candidate) && !igThem.has(candidate)) {
          igGen.add(candidate);
        }
        igG++;
      }
      igHashtags.generales = Array.from(igGen).slice(0, 4);

      // TWITTER (X) (9 Tags)
      const twHashtags = { generales: [], tematicos: [], personalizados: [] };
      const twPers = new Set([communityTag]);
      if (primaryTitleTag) twPers.add(primaryTitleTag);
      derivedTitleTags.forEach(tag => twPers.add(tag));
      let twP = 0;
      while (twPers.size < 3 && twP < customPersonalizedBase.length) {
        twPers.add(customPersonalizedBase[twP]);
        twP++;
      }
      twHashtags.personalizados = Array.from(twPers).slice(0, 3);

      const twThem = new Set(thematicPool);
      let twT = 0;
      while(twThem.size < 3 && twT < fallbackThematicPool.length) {
        twThem.add(fallbackThematicPool[twT]);
        twT++;
      }
      twHashtags.tematicos = Array.from(twThem).slice(0, 3);

      const twGen = new Set();
      let twG = 0;
      while(twGen.size < 3 && twG < generalPool.length) {
        const candidate = generalPool[twG];
        if (!twPers.has(candidate) && !twThem.has(candidate)) {
          twGen.add(candidate);
        }
        twG++;
      }
      twHashtags.generales = Array.from(twGen).slice(0, 3);

      return {
        youtube: ytHashtags,
        facebook: fbHashtags,
        instagram: igHashtags,
        twitter: twHashtags,
        metadata: {
          generatedAt: new Date().toISOString(),
          audience,
          communityName: community.name,
          contentType
        }
      };
    };

    // ==========================================
    // COMPONENT: CORE REACT APP
    // ==========================================
    function App() {

      const [toast, setToast] = useState({ message: '', visible: false, type: 'info' });

      const loadingTimerRef = useRef(null);

      // Load History on Mount
      useEffect(() => {
        const saved = localStorage.getItem('hashtag_history');
        if (saved) {
          try { setHistory(JSON.parse(saved)); } catch (e) {}
        }
      }, []);

      const saveToHistory = (newEntry) => {
        const updated = [newEntry, ...history.filter(h => h.id !== newEntry.id)].slice(0, 8);
        setHistory(updated);
        localStorage.setItem('hashtag_history', JSON.stringify(updated));
      };

      const deleteHistoryItem = (itemId, e) => {
        e.stopPropagation();
        playResetSound();
        const updated = history.filter(h => h.id !== itemId);
        setHistory(updated);
        localStorage.setItem('hashtag_history', JSON.stringify(updated));
        showToast('Historial eliminado correctamente', 'success');
      };

      const toggleSound = () => {
        const newState = !soundOn;
        setSoundOn(newState);
        setSoundEnabled(newState);
        if (newState) {
          setTimeout(() => playClickSound(), 50);
        }
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, visible: true, type });
        setTimeout(() => {
          setToast(prev => ({ ...prev, visible: false }));
        }, 3000);
      };

      const handleGenerate = (e) => {
        e.preventDefault();
        if (!title.trim()) {
          showToast('Por favor, ingresa el título del contenido', 'error');
          return;
        }

        playClickSound();
        setLoading(true);
        setResults(null);

        const steps = [
          'Sincronizando fe digital con bases católicas...',
          'Analizando perfil de la comunidad seleccionada...',
          'Extrayendo intenciones y términos del título...',
          'Estructurando hashtags temáticos y generales...',
          'Ejecutando algoritmo viral de optimización orgánica...'
        ];

        let idx = 0;
        setLoadingStep(steps[idx]);

        loadingTimerRef.current = setInterval(() => {
          idx++;
          if (idx < steps.length) {
            setLoadingStep(steps[idx]);
          } else {
            clearInterval(loadingTimerRef.current);
            const generated = generateHashtags({
              title,
              contentType,
              communityId,
              manualAudience
            });

            setResults(generated);
            setLoading(false);
            playSuccessSound();
            showToast('Hashtags generados correctamente', 'success');

            const newEntry = {
              id: Date.now().toString(),
              title,
              contentType,
              communityId,
              manualAudience,
              results: generated,
              timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            saveToHistory(newEntry);
          }
        }, 500);
      };

      const handleCopy = (platform, data) => {
        playClickSound();
        let copyText = '';
        
        if (platform === 'youtube') {
          const allYTTags = [...data.generales, ...data.tematicos, ...data.personalizados];
          copyText = allYTTags.join(',');
        } else {
          const g = data.generales.join(' ');
          const t = data.tematicos.join(' ');
          const p = data.personalizados.join(' ');
          copyText = `${g}\n${t}\n${p}`;
        }

        navigator.clipboard.writeText(copyText)
          .then(() => {
            setCopiedId(platform);
            playSuccessSound();
            showToast(`Copiado al portapapeles (${platform.toUpperCase()})`, 'success');
            setTimeout(() => setCopiedId(null), 2000);
          })

            showToast('Error al copiar al portapapeles', 'error');

        setTitle('');

        setTitle(item.title);
        setContentType(item.contentType);

        setManualAudience(item.manualAudience || 'adultos');
        setResults(item.results);

        showToast('Generación cargada desde historial', 'success');

        if (communityId === 'OTRAS_OPCIONES') {

                 manualAudience === 'adolescentes' ? 'Jóvenes (Viral)' :

        return audience === 'ninos' ? 'Niños (Familiar)' :

      return (
        <div className="min-h-screen bg-cyber-dark cyber-grid relative text-slate-100 pb-16">

                  <h1 className="text-xl font-bold font-sans tracking-wide bg-gradient-to-r from-white via-slate-200 to-cyber-blue bg-clip-text text-transparent">

                  <p className="text-[10px] text-slate-400 font-sans tracking-widest uppercase">Evangelización Digital Inteligente</p>

                  className={`p-2.5 rounded-lg border transition-all duration-300 ${soundOn ? 'border-cyber-purple/30 bg-cyber-purple/10 text-cyber-purple' : 'border-white/5 bg-white/5 text-slate-400'}`}
                >
                  {soundOn ? (
                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>

                <button

                  className={`flex items-center space-x-2 px-4 py-2.5 rounded-lg border text-sm font-medium transition-all duration-300 ${showHistory ? 'border-cyber-blue bg-cyber-blue/15 text-cyber-blue glow-blue' : 'border-white/10 bg-white/5 text-slate-300'}`}
                >
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>

            {/* History Slide Panel */}
            {showHistory && (
